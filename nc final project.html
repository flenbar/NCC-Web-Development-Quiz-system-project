<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Quiz App</title>
    <link rel="stylesheet" href="NCC final project.css">
</head>
<body>

    <div class="container">

        <h1>Simple Quiz System</h1>

        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>

        <p class="question-count">Question 1 of 10</p>

        <div class="que-timer">
            <h2 class="question">Loading Question...</h2>
            <span class="timer">Time Left: 30</span>
        </div>

        <div class="answerbuttons">
            <!-- Answers generated by JavaScript -->
        </div>

        <div class="navigation">
            <button class="prev-btn">Previous</button>
            <button class="next-btn">Next</button>
        </div>

    </div>

    <script src="NCC final project.js"></script>

</body>
</html>
